{{- if .Values.config.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sie-cluster.config.serviceName" . }}
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    {{- include "sie-cluster.config.labels" . | nindent 4 }}
  {{- with .Values.config.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # ClusterIP only: sie-config is an internal control plane. Never expose it via
  # a LoadBalancer or the shared public ingress; the Rust gateway reaches it over
  # the in-cluster service DNS name.
  type: {{ .Values.config.service.type }}
  ports:
    - name: http
      port: {{ .Values.config.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "sie-cluster.config.selectorLabels" . | nindent 4 }}
{{- end }}
