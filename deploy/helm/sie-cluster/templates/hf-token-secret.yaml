{{- if and .Values.hfToken .Values.hfToken.create }}
apiVersion: v1
kind: Secret
metadata:
  name: hf-token
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    {{- include "sie-cluster.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ required "hfToken.value must be set when hfToken.create is true" .Values.hfToken.value | b64enc | quote }}
{{- end }}
