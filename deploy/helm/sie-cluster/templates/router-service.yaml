apiVersion: v1
kind: Service
metadata:
  name: {{ include "sie-cluster.router.serviceName" . }}
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    {{- include "sie-cluster.router.labels" . | nindent 4 }}
  {{- with .Values.router.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.router.service.type }}
  ports:
    - name: http
      port: {{ .Values.router.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "sie-cluster.router.selectorLabels" . | nindent 4 }}
