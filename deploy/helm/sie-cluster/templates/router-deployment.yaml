{{- /* Validate: at most one config delivery mode may be active (zero = embedded-in-image, also valid) */}}
{{- $modesEnabled := list }}
{{- if .Values.router.embeddedConfigs.enabled }}{{- $modesEnabled = append $modesEnabled "embeddedConfigs" }}{{- end }}
{{- if .Values.router.configMap.enabled }}{{- $modesEnabled = append $modesEnabled "configMap" }}{{- end }}
{{- if gt (len $modesEnabled) 1 }}
  {{- fail (printf "router: multiple config delivery modes enabled (%v). Enable only one of: embeddedConfigs, configMap." $modesEnabled) }}
{{- end }}
{{- /* Validate: clusterRouting=queue requires NATS and JetStream; payloadStore is recommended for large payloads */}}
{{- if eq (default "direct" .Values.clusterRouting) "queue" }}
  {{- if not .Values.nats.enabled }}
    {{- fail "clusterRouting=queue requires nats.enabled=true" }}
  {{- end }}
  {{- if not .Values.nats.config.jetstream.enabled }}
    {{- fail "clusterRouting=queue requires nats.config.jetstream.enabled=true" }}
  {{- end }}
  {{- if .Values.payloadStore.enabled }}
    {{- if not (or (hasPrefix "s3://" (default "" .Values.payloadStore.url)) (hasPrefix "gs://" (default "" .Values.payloadStore.url))) }}
      {{- fail "payloadStore.url must be an object-store URL (s3://bucket/prefix or gs://bucket/prefix), not a local path" }}
    {{- end }}
  {{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sie-cluster.router.serviceName" . }}
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    {{- include "sie-cluster.router.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.router.replicas }}
  {{- if and .Values.nats.enabled .Values.nats.configRestore }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "sie-cluster.router.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sie-cluster.router.selectorLabels" . | nindent 8 }}
      {{- with .Values.router.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "sie-cluster.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "sie-cluster.serviceAccountName" . }}
      containers:
        - name: router
          image: {{ include "sie-cluster.router.image" . }}
          imagePullPolicy: {{ .Values.router.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # Kubernetes-based worker discovery
            - name: SIE_ROUTER_KUBERNETES
              value: "true"
            - name: SIE_ROUTER_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SIE_ROUTER_K8S_SERVICE
              value: {{ include "sie-cluster.worker.serviceName" . }}
            # Available GPU types (from Helm values, survives scale-to-zero)
            - name: SIE_ROUTER_CONFIGURED_GPUS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sie-cluster.fullname" . }}-gpu-config
                  key: available-gpus
            # Machine profiles (JSON format for pool validation and routing)
            - name: SIE_ROUTER_MACHINE_PROFILES
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sie-cluster.fullname" . }}-gpu-config
                  key: machine-profiles
            # Logging configuration
            - name: SIE_LOG_LEVEL
              value: {{ .Values.logging.level | quote }}
            {{- if .Values.logging.json }}
            - name: SIE_LOG_JSON
              value: "true"
            {{- end }}
            # Router auth (static token)
            - name: SIE_AUTH_MODE
              value: {{ .Values.router.auth.mode | quote }}
            {{- if .Values.router.auth.tokenSecretName }}
            - name: SIE_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.router.auth.tokenSecretName }}
                  key: {{ .Values.router.auth.tokenSecretKey }}
            {{- end }}
            {{- if .Values.nats.enabled }}
            - name: SIE_NATS_URL
              value: {{ .Values.nats.url | default (printf "nats://%s-nats:4222" .Release.Name) | quote }}
            - name: SIE_CONFIG_STORE_DIR
              value: {{ .Values.nats.configStoreDir | quote }}
            - name: SIE_CONFIG_RESTORE
              value: {{ .Values.nats.configRestore | quote }}
            {{- end }}
            {{- if and .Values.clusterRouting (ne .Values.clusterRouting "direct") }}
            - name: SIE_CLUSTER_ROUTING
              value: {{ .Values.clusterRouting | quote }}
            {{- end }}
            {{- if .Values.payloadStore.enabled }}
            - name: SIE_PAYLOAD_STORE_URL
              value: {{ .Values.payloadStore.url | quote }}
            - name: SIE_PAYLOAD_STORE_TTL
              value: {{ .Values.payloadStore.ttlSeconds | quote }}
            {{- end }}
            {{- if .Values.router.embeddedConfigs.enabled }}
            # Config paths for embedded configs (auto-generated ConfigMaps from chart files/)
            - name: SIE_BUNDLES_DIR
              value: /configs/bundles
            - name: SIE_MODELS_DIR
              value: /configs/models
            {{- else if .Values.router.configMap.enabled }}
            # Config paths for manual ConfigMap-based configs
            - name: SIE_BUNDLES_DIR
              value: /configs/bundles
            - name: SIE_MODELS_DIR
              value: /configs/models
            # Enable hot reload for ConfigMap-based configs (kubelet syncs changes to mounted volume)
            - name: SIE_ROUTER_HOT_RELOAD
              value: "true"
            # Use polling watcher for ConfigMap (inotify doesn't work with K8s symlink-based mounts)
            - name: SIE_ROUTER_POLLING_WATCHER
              value: "true"
            {{- end }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.router.resources | nindent 12 }}
          {{- if or .Values.router.embeddedConfigs.enabled .Values.router.configMap.enabled (and .Values.nats.enabled .Values.nats.configRestore) }}
          volumeMounts:
            {{- if .Values.router.embeddedConfigs.enabled }}
            - name: bundles-config
              mountPath: /configs/bundles
              readOnly: true
            - name: models-config
              mountPath: /configs/models
              readOnly: true
            {{- else if .Values.router.configMap.enabled }}
            - name: config-repo
              mountPath: /configs
              readOnly: true
            {{- end }}
            {{- if and .Values.nats.enabled .Values.nats.configRestore }}
            - name: config-store
              mountPath: {{ .Values.nats.configStoreDir }}
            {{- end }}
          {{- end }}

      {{- if or .Values.router.embeddedConfigs.enabled .Values.router.configMap.enabled (and .Values.nats.enabled .Values.nats.configRestore) }}
      volumes:
        {{- if .Values.router.embeddedConfigs.enabled }}
        # Auto-generated ConfigMaps from chart files/bundles and files/models
        - name: bundles-config
          configMap:
            name: {{ include "sie-cluster.fullname" . }}-bundles
        - name: models-config
          configMap:
            name: {{ include "sie-cluster.fullname" . }}-models
            # With flat YAML structure, configs are directly in models/ directory
            items:
              {{- range $path, $_ := .Files.Glob "files/models/*.yaml" }}
              {{- $parts := splitList "/" $path }}
              {{- $filename := index $parts (sub (len $parts) 1) }}
              - key: {{ $filename }}
                path: {{ $filename }}
              {{- end }}
        {{- else if .Values.router.configMap.enabled }}
        - name: config-repo
          projected:
            sources:
              - configMap:
                  name: {{ .Values.router.configMap.bundlesConfigMap | default (printf "%s-bundles" .Values.router.configMap.name) }}
                  items:
                    {{- range .Values.router.configMap.bundles }}
                    - key: {{ .key }}
                      path: bundles/{{ .file }}
                    {{- end }}
              - configMap:
                  name: {{ .Values.router.configMap.modelsConfigMap | default (printf "%s-models" .Values.router.configMap.name) }}
                  items:
                    {{- range .Values.router.configMap.models }}
                    - key: {{ .key }}
                      path: models/{{ .key }}.yaml
                    {{- end }}
        {{- end }}
        {{- if and .Values.nats.enabled .Values.nats.configRestore }}
        - name: config-store
          persistentVolumeClaim:
            claimName: {{ include "sie-cluster.fullname" . }}-config-store
        {{- end }}

      {{- end }}
      {{- with .Values.router.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.router.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.router.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
