apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sie-cluster.fullname" . }}-config
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    {{- include "sie-cluster.labels" . | nindent 4 }}
data:
  # Router configuration
  SIE_LOG_LEVEL: {{ .Values.logging.level | quote }}
  {{- if .Values.logging.json }}
  SIE_LOG_JSON: "true"
  {{- end }}

  # Worker discovery settings
  SIE_ROUTER_K8S_NAMESPACE: {{ include "sie-cluster.namespace" . }}
  SIE_ROUTER_K8S_SERVICE: {{ include "sie-cluster.worker.serviceName" . }}

  # Model configuration
  {{- if .Values.workers.common.preloadModels }}
  SIE_PRELOAD_MODELS: {{ join "," .Values.workers.common.preloadModels | quote }}
  {{- end }}

  # Bundle configuration
  SIE_BUNDLE: {{ .Values.workers.common.bundle | quote }}
