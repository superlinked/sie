{{- if .Values.serviceMonitor.enabled }}
# ServiceMonitor for Prometheus Operator
# Scrapes metrics from the gateway, sie-config, and all worker pools (any
# service that exposes the `http` port under the chart's common selector
# labels).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "sie-cluster.fullname" . }}
  namespace: {{ include "sie-cluster.namespace" . }}
  labels:
    {{- include "sie-cluster.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "sie-cluster.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ include "sie-cluster.namespace" . }}
  endpoints:
    - port: http
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
      path: /metrics
{{- end }}
