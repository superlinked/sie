<svg xmlns="http://www.w3.org/2000/svg" width="860" height="180" viewBox="0 0 860 180" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#888"/>
    </marker>
  </defs>

  <text x="430" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#333">Zero-Shot NLI</text>
  <text x="430" y="44" text-anchor="middle" font-size="11" fill="#777">L1 only</text>

  <rect x="330" y="52" width="160" height="34" rx="8" fill="#F6F6F6" stroke="#CFCFCF"/>
  <text x="410" y="72" text-anchor="middle" font-size="11" fill="#555">L1 category labels (26)</text>
  <line x1="410" y1="86" x2="410" y2="96" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="30" y="104" width="190" height="48" rx="10" fill="#F6F6F6" stroke="#BDBDBD" stroke-width="1.2"/>
  <text x="125" y="124" text-anchor="middle" font-weight="600" fill="#333">Product description</text>
  <text x="125" y="140" text-anchor="middle" font-size="10" fill="#777">Input text</text>

  <line x1="220" y1="128" x2="260" y2="128" stroke="#888" stroke-width="1.4" marker-end="url(#arrow)"/>

  <rect x="270" y="94" width="280" height="68" rx="10" fill="#FE8019" stroke="#D96A0B" stroke-width="1.4"/>
  <text x="410" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">SIE — extract()</text>
  <text x="410" y="138" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.88)">Score the description against every L1 label</text>

  <line x1="550" y1="128" x2="590" y2="128" stroke="#888" stroke-width="1.4" marker-end="url(#arrow)"/>

  <rect x="600" y="94" width="230" height="68" rx="10" fill="#F6F6F6" stroke="#BDBDBD" stroke-width="1.2"/>
  <text x="715" y="116" text-anchor="middle" font-weight="600" fill="#333">Ranked L1 labels</text>
  <text x="715" y="134" text-anchor="middle" font-size="10" fill="#555">1. Apparel &amp; Accessories</text>
  <text x="715" y="148" text-anchor="middle" font-size="10" fill="#888">2. Sporting Goods</text>
</svg>
