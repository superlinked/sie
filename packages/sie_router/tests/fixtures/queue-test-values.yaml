# Helm values override for queue routing integration tests.
# Deploys only NATS with JetStream — all other components disabled.

# Disable router/worker deployments (we only need NATS for queue tests)
router:
  replicas: 0

# Cluster routing mode (queue for NATS JetStream work queue)
clusterRouting: "queue"

# NATS configuration
nats:
  install: true
  enabled: true
  config:
    jetstream:
      enabled: true
      memoryStore:
        enabled: true
        maxSize: 256Mi
      fileStore:
        enabled: false

# Disable all sub-chart dependencies
keda:
  install: false
kube-prometheus-stack:
  install: false
dcgmExporter:
  install: false
loki:
  install: false
alloy:
  install: false
eventExporter:
  install: false

# Disable features not needed for queue tests
serviceMonitor:
  enabled: false
dashboards:
  enabled: false
healthGates:
  enabled: false
