sie_id: nomic-ai/nomic-embed-text-v2-moe
hf_id: nomic-ai/nomic-embed-text-v2-moe
inputs:
  text: true
  image: false
  audio: false
  video: false
tasks:
  encode:
    dense:
      dim: 768
    sparse: null
    multivector: null
  score: null
  extract: null
max_sequence_length: 2048
profiles:
  default:
    max_batch_tokens: 16384
    compute_precision: null
    adapter_path: sie_server.adapters.nomic_flash:NomicFlashAdapter
    adapter_options:
      loadtime: {}
      runtime:
        pooling: mean
        normalize: true
        query_template: 'search_query: {text}'
        doc_template: 'search_document: {text}'
